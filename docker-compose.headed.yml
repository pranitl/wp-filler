services:
  wp-filler-headed:
    build:
      context: .
      dockerfile: Dockerfile.headed
    container_name: wp-filler-headed
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - HEADLESS=false
      - DEBUG_MODE=true
      - DISPLAY=:99
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - ./docker-volumes/wp-filler:/home/pptruser/.wp-filler
      - ./docker-volumes/wp-session:/app/.wp-session
    restart: unless-stopped
